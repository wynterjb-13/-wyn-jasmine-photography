<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebration — Wyn Jasmine Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #4e4b44;
    --light: #ddd8d5;
    --white: #ddd8d5;
    --accent: #ada192;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Montserrat', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--white); color: var(--dark); overflow-x: hidden; }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 64px;
  }

  .nav-logo {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--mid);
    text-decoration: none;
    text-transform: uppercase;
    line-height: 1.4;
    text-align: center;
    flex: 1;
  }

  .hamburger {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px; padding: 4px; margin-left: auto;
  }
  .hamburger span { display: block; width: 24px; height: 1px; background: var(--mid); transition: all 0.3s ease; }

  .menu-overlay {
    position: fixed; inset: 0; background: var(--white); z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2.5rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .menu-overlay a {
    font-family: var(--serif); font-size: 2.5rem; font-weight: 300;
    color: var(--mid); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s;
  }
  .menu-overlay a:hover { color: var(--accent); }
  .menu-close {
    position: absolute; top: 1.5rem; right: 2rem;
    background: none; border: none; color: var(--mid); font-size: 1.8rem;
    cursor: pointer; font-weight: 300; line-height: 1;
  }

  /* ── HERO ── */
  .gallery-hero {
    margin-top: 64px;
    height: 40vh;
    min-height: 240px;
    background: var(--light);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  .gallery-hero-bg {
    position: absolute; inset: 0;
    background-image: url('images/celebration/hero.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.3);
  }

  /* Fallback gradient if no hero image */
  .gallery-hero-bg:not([style*="url"]) {
    background-image: none;
    background: linear-gradient(135deg, rgba(221,216,213,0.95) 0%, rgba(173,161,146,0.95) 100%);
  }

  .gallery-hero-content {
    position: relative; z-index: 1; text-align: center; padding: 2rem;
    animation: fadeUp 1s ease both;
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--sans); font-size: 0.6rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
    text-decoration: none; margin-bottom: 1.5rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }
  .back-link::before { content: '←'; font-size: 0.8rem; }

  .gallery-hero-content h1 {
    font-family: var(--sans); font-weight: 300;
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 0.4em; color: var(--white);
    text-transform: uppercase; line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .hero-divider {
    width: 40px; height: 1px; background: var(--accent); margin: 0 auto 0.75rem;
  }

  .gallery-hero-content p {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: rgba(255,255,255,0.55);
  }

  /* ── GALLERY GRID ── */
  .photo-grid {
    column-count: 1;
    column-gap: 4px;
    padding: 4px;
    background: var(--white);
  }

  @media (min-width: 600px) {
    .photo-grid { column-count: 2; }
  }

  @media (min-width: 1000px) {
    .photo-grid { column-count: 3; }
  }

  .photo-item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: #ddd8d5;
    break-inside: avoid;
    margin-bottom: 4px;
    max-height: 500px;
  }

  .photo-item img {
    width: 100%; height: auto;
    object-fit: cover;
    display: block;
    filter: grayscale(20%) brightness(0.9);
    transition: transform 0.6s ease, filter 0.4s ease;
  }

  .photo-item:hover img {
    transform: scale(1.05);
    filter: grayscale(0%) brightness(1);
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.95);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }

  .lightbox img {
    max-width: 90vw; max-height: 88vh;
    object-fit: contain;
    display: block;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  .lb-close {
    position: absolute; top: 1.5rem; right: 2rem;
    background: none; border: none; color: white;
    font-size: 2rem; cursor: pointer; line-height: 1;
    opacity: 0.6; transition: opacity 0.2s;
  }
  .lb-close:hover { opacity: 1; }

  .lb-prev, .lb-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: white;
    font-size: 2rem; cursor: pointer; padding: 1rem;
    opacity: 0.5; transition: opacity 0.2s;
  }
  .lb-prev:hover, .lb-next:hover { opacity: 1; }
  .lb-prev { left: 1rem; }
  .lb-next { right: 1rem; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 6rem 2rem;
    color: rgba(255,255,255,0.3);
    display: none;
  }
  .empty-state h3 {
    font-family: var(--serif); font-weight: 300;
    font-size: 1.5rem; margin-bottom: 1rem;
  }
  .empty-state p {
    font-size: 0.75rem; letter-spacing: 0.15em;
    text-transform: uppercase; line-height: 2;
  }
  .empty-state code {
    color: var(--accent); font-family: monospace;
    font-size: 0.85rem; letter-spacing: 0;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--dark); text-align: center; padding: 2rem;
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Wyn Jasmine<br>Photography</a>
  <button class="hamburger" id="menuBtn" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="menu-overlay" id="menuOverlay">
  <button class="menu-close" id="menuClose">&times;</button>
  <a href="index.html#portfolio" onclick="closeMenu()">Portfolio</a>
  <a href="index.html#about" onclick="closeMenu()">About</a>
  <a href="index.html#contact" onclick="closeMenu()">Contact</a>
</div>

<section class="gallery-hero">
  <div class="gallery-hero-bg"></div>
  <div class="gallery-hero-content">
    <a href="index.html" class="back-link">Back to Home</a>
    <h1>Celebration</h1>
    <div class="hero-divider"></div>
    <p>Joy worth remembering</p>
  </div>
</section>

  <h3>Your photos will appear here</h3>

    Create a folder: <code><images>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-prev" id="lbPrev">&#8592;</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext">&#8594;</button>
</div>

<footer>
  &copy; 2026 Wyn Jasmine Photography &mdash; All rights reserved
</footer>

<script>
  // Nav menu
  document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('menuOverlay').classList.add('open'));
  document.getElementById('menuClose').addEventListener('click', () => document.getElementById('menuOverlay').classList.remove('open'));
  function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }

  // Show empty state if no photos
  const grid = document.getElementById('photoGrid');
  const items = grid.querySelectorAll('.photo-item');
  if (items.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    grid.style.display = 'none';
  }

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  let currentIndex = 0;
  const images = [];

  items.forEach((item, i) => {
    const img = item.querySelector('img');
    images.push({ src: img.src, alt: img.alt });
    item.addEventListener('click', () => openLightbox(i));
  });

  function openLightbox(i) {
    currentIndex = i;
    lbImg.src = images[i].src;
    lbImg.alt = images[i].alt;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lbImg.src = images[currentIndex].src;
  });
  document.getElementById('lbNext').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % images.length;
    lbImg.src = images[currentIndex].src;
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
  });

  // Close lightbox on background click
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
</script>

</body>
</html>
